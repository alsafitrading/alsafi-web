name: Deploy to gh-pages branch

# Fallback if the main Pages Actions workflow cannot auto-enable Pages.
# After first success: Settings → Pages → Source → Deploy from branch → gh-pages / root

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github'
